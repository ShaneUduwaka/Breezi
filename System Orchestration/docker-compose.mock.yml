version: '3.8'

services:

  # Main Application (Development)
  app:
    build: .
    container_name: breezi-orchestration-dev
    ports:
      - "8000:8000"  # Main API
      - "8001:8001"  # Audio WebSocket
    environment:
      - CALL_INGESTION_TYPE=mock
      - STT_PROVIDER=mock
      - TTS_PROVIDER=mock
      - CLIENT_DB_TYPE=mock
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
    depends_on:
      - redis
    networks:
      - breezi-network
    volumes:
      - .:/app  # Mount entire directory for live reload
      - ./logs:/app/logs
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped


  # Redis
  redis:
    image: redis:7-alpine
    container_name: breezi-redis-dev
    ports:
      - "6379:6379"
    networks:
      - breezi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # Mock STT Service
  mock-stt:
    image: python:3.11-slim
    container_name: breezi-mock-stt-dev
    ports:
      - "8002:8002"
    working_dir: /app
    command: |
      /bin/bash -c "
        pip install flask &&
        python mock_stt.py
      "
    volumes:
      - ./docker/mock-stt:/app
    networks:
      - breezi-network
    restart: unless-stopped


  # Mock TTS Service
  mock-tts:
    image: python:3.11-slim
    container_name: breezi-mock-tts-dev
    ports:
      - "8003:8003"
    working_dir: /app
    command: |
      /bin/bash -c "
        pip install flask &&
        python mock_tts.py
      "
    volumes:
      - ./docker/mock-tts:/app
    networks:
      - breezi-network
    restart: unless-stopped


networks:
  breezi-network:
    driver: bridge
