[pytest]
# Pytest configuration for FastAPI production testing

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Markers for test categorization
markers =
    integration: Integration tests requiring multiple components
    performance: Performance and load tests
    security: Security and vulnerability tests
    unit: Unit tests for individual components
    api: FastAPI endpoint tests
    docker: Docker build and compose tests
    websocket: WebSocket connection tests
    slow: Tests that take more than 1 second
    requires_redis: Tests requiring Redis connection
    requires_docker: Tests requiring Docker daemon
