version: '3.8'

services:

  # Main Application
  app:
    build: .
    container_name: breezi-orchestration
    ports:
      - "8000:8000"  # Main API
      - "8001:8001"  # Audio WebSocket
    environment:
      - CALL_INGESTION_TYPE=${CALL_INGESTION_TYPE:-twilio}
      - STT_PROVIDER=${STT_PROVIDER:-google}
      - TTS_PROVIDER=${TTS_PROVIDER:-google}
      - CLIENT_DB_TYPE=${CLIENT_DB_TYPE:-rest}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      - redis
      - milvus
    networks:
      - breezi-network
    volumes:
      - ./logs:/app/logs
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped


  # Redis (Session Storage & Cache)
  redis:
    image: redis:7-alpine
    container_name: breezi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - breezi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # Vector Database (Milvus)
  milvus:
    image: milvusdb/milvus:latest
    container_name: breezi-vectordb
    ports:
      - "19530:19530"  # MetaStore/DataStore
      - "9091:9091"    # Metrics
    environment:
      - COMMON_STORAGETYPE=local
      - COMMON_LOGLEVEL=info
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - breezi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped


  # Optional: Mock STT Service (for development)
  mock-stt:
    image: python:3.11-slim
    container_name: breezi-mock-stt
    ports:
      - "8002:8002"
    environment:
      - FLASK_APP=mock_stt.py
      - FLASK_ENV=development
    volumes:
      - ./docker/mock-stt:/app
    working_dir: /app
    command: pip install flask && python -m flask run --host=0.0.0.0 --port=8002
    networks:
      - breezi-network
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - mock


  # Optional: Mock TTS Service (for development)
  mock-tts:
    image: python:3.11-slim
    container_name: breezi-mock-tts
    ports:
      - "8003:8003"
    environment:
      - FLASK_APP=mock_tts.py
      - FLASK_ENV=development
    volumes:
      - ./docker/mock-tts:/app
    working_dir: /app
    command: pip install flask && python -m flask run --host=0.0.0.0 --port=8003
    networks:
      - breezi-network
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - mock


volumes:
  redis-data:
  milvus-data:

networks:
  breezi-network:
    driver: bridge
